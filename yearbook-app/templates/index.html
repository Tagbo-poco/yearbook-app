<!DOCTYPE html>
<html>
<head>
    <title>UCIS-Yearbook Search</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        .container {
            display: flex;
            height: 100vh;
            flex-direction: row-reverse;
        }

        /* 右侧背景（不变形） */
        .left {
            flex: 1;
            background: url("{{ url_for('static', filename='images/bg.jpg') }}");
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: #0b3c66;
        }

        /* 左侧表单 */
        .right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
        }

        .card {
            width: 320px;
            padding: 30px;
            border-radius: 15px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 10px;
        }

        p {
            color: gray;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.7);
        }

        input:focus {
            box-shadow: 0 0 8px #4facfe;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .result {
            margin-top: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
        }

        img {
            margin-top: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- 背景 -->
    <div class="left"></div>

    <!-- 表单 -->
    <div class="right">

        <div class="card">

            <h2>UCIS-Yearbook Search</h2>
            <p>Find student information</p>

            <form method="post">
                <input name="name" placeholder="Search name...">
                <input name="grade" placeholder="Search grade...">
                <input name="class" placeholder="Search class...">
                <button type="submit">🔍 Search</button>
            </form>

            <!-- 结果区域 -->
            {% if results %}
                {% for r in results %}
                <div class="result">
                    <h3>{{ r.name }}</h3>
                    <p>Grade: {{ r.grade }}</p>
                    <p>Class: {{ r.class }}</p>
                    <p>Date: {{ r.date }}</p>

                    {% if r.image %}
                        <img src="{{ url_for('static', filename='images/' + r.image) }}" width="120">
                    {% else %}
                        <p>No Image</p>
                    {% endif %}
                </div>
                {% endfor %}
            {% else %}
                <p>No result found</p>
            {% endif %}

        </div>

    </div>

</div>

</body>
</html>
